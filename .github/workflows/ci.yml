name: CI

# Single quality gate for the project (CLAUDE.md §6 / §8.4 milestone-done
# checks). Runs on every PR before merge, and on every push to main — where a
# green run is what triggers deploy.yml via workflow_run, so deploy never ships
# code CI hasn't validated.
on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

# A new push to the same PR makes earlier runs obsolete — cancel them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.3.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:coverage
      - run: pnpm build
      # v2 (primary game) headless smoke: the economy → AI → combat → victory
      # loop must run a deterministic 4-AI batch to completion without crashing.
      - run: pnpm playtest:v2 spectator-4ai --runs 5 --max-ticks 1500
      # v1 (?v1 easter egg) headless smoke + balance guard — the prototype is
      # kept, so it stays green too.
      - run: pnpm playtest src/scenarios/default.json --runs 10
      - run: pnpm balance
      # Engine coverage (§5.1 target ≥ 90%) is enforced at PR review, so surface
      # the report as an artifact rather than hard-failing the build on it.
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore
