<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Knight Strike</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        /* dvh = the *visible* viewport — excludes the mobile browser's
           toolbar, so bottom-anchored UI (the control bar) isn't hidden. */
        height: 100dvh;
        background: #1a1a1a;
        overflow: hidden;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #eee;
      }
      #app {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }
      #app canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
